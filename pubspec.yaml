name: vibe_coral_quest
description: "BairroMatch - Encontre o bairro ideal em qualquer cidade."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado
  flutter_riverpod: ^2.5.1

  # Navegação
  go_router: ^14.6.0

  # Backend
  supabase_flutter: ^2.8.0
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0

  # Mapa (equivalente ao Leaflet)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Rede
  http: ^1.2.2

  # UI
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0

  # Variáveis de ambiente
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
